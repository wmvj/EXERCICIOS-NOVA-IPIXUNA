<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Anatomia CSS</title>
    <style>
        .seletor {
            background-color:blue;
            color: #fff;
            font-size: 30px;
            text-align: center;
            border: solid 5px navy;
            width: calc(100% - 40px);
        }

        .seletor:hover {
            background-color: red;
        }

        .seletor::first-letter{
            font-size: 60px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="seletor">Conteúdo</div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags apra texto</title>
</head>
<body>
    <!-- Negrito e italico -->
     <p>Texto em <b>negrito</b> e <i>itálico</i></p>

    <!-- Sobreescrito e subscrito -->
    <p>2<sup>2</sup> = 4 e H<sub>2</sub>O = Água!</p>

    <!--Marcações semãnticas -->
    <blockquote cite="https://wikipedia.org"><p>Citações de texto longo...</p></blockquote>

    <p>
        <abbr title="Doutor">Dr</abbr> do livro "X"
        <cite>Livro de HTML</cite> definiu conceitos de tags basicas
        <dfn>Cipa</dfn> doença sem sentir dor
    </p>

    <address>
        <p>Rua 19, n<sup>o</sup>20...</p>
    </address>
    <p>
        Esse celular vale <s>R$ 1200,00</s> R$ 1000,00
    </p>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Poppins:wght@400;700&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="style.css">
    <title>Página de Login</title>
</head>
<body>
<div class="flex">
    <div class="formulario">
        <header>
            <img src="./assets/logo.svg" alt="">
        </header>
        <main>
            <div class="cabecalho">
                <h1>Acesse a plataforma</h1>
                <p>Faça login ou registre-se para começar a construir seus projetos ainda hoje.</p>
            </div>
            <form>
              <div>  
                <label for="email">E-mail</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email"
                    required
                    placeholder="Digite seu e-mail" 
                >
              </div>
              <div>  
                <label for="senha">Senha</label>
                <input 
                    type="password" 
                    id="senha" 
                    name="senha"
                    required
                    placeholder="Digite sua senha" 
                >
                <img src="./assets/eye-off.svg" alt="">
                <img src="./assets/eye.svg" alt="">
              </div>
              <button type="submit">
                Entrar
              </button>
              <div>
                Ainda não tem uma conta?
                <a href="#">Inscreva-se</a>
              </div>
            </form> 
            
        </main>
    </div>
    <img src="./assets/bg.jpg" alt="">
</div>
</body>
</html>
